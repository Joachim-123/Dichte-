<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dichte-Würfel</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    text-align: center;
    margin: 20px;
  }

  h3 {
    margin-bottom: 20px;
  }

  .control {
    margin: 15px 0;
  }

  input[type="range"] {
    width: 300px;
    max-width: 90%;
  }

  #cube {
    margin: 30px auto;
    border: 2px solid black;
    position: relative;
    background: white;
  }

  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: black;
    border-radius: 50%;
  }

  #formula {
    margin-top: 20px;
    font-size: 1.8em;
    line-height: 1.4;
  }

  /* Darstellung eines Bruchs */
  .fraction {
    display: inline-block;
    vertical-align: middle;
    text-align: center;
    margin: 0 4px;
  }

  .fraction .top {
    display: block;
    border-bottom: 2px solid #000;
    padding: 0 8px;
  }

  .fraction .bottom {
    display: block;
  }
</style>
</head>
<body>

<h3>Dichte</h3>

<div class="control">
  <label>
    Masse (m): <span id="mVal">50</span>
  </label><br>
  <input type="range" id="mass" min="1" max="200" value="50">
</div>

<div class="control">
  <label>
    Volumen (V): <span id="vVal">100</span>
  </label><br>
  <input type="range" id="volume" min="20" max="200" value="100">
</div>

<div id="cube"></div>

<p id="formula">
  ρ =
  <span class="fraction">
    <span class="top">m</span>
    <span class="bottom">V</span>
  </span>
  =
  <span class="fraction">
    <span class="top" id="mNum">50</span>
    <span class="bottom" id="vNum">100</span>
  </span>
  =
  <span id="rhoValue">0.50</span>
</p>

<script>
const mass = document.getElementById("mass");
const volume = document.getElementById("volume");
const cube = document.getElementById("cube");

const mVal = document.getElementById("mVal");
const vVal = document.getElementById("vVal");

const mNum = document.getElementById("mNum");
const vNum = document.getElementById("vNum");
const rhoValue = document.getElementById("rhoValue");

function update() {
  const m = Number(mass.value);
  const V = Number(volume.value);
  const rho = m / V;

  // Werte neben den Reglern aktualisieren
  mVal.textContent = m;
  vVal.textContent = V;

  // Formel aktualisieren
  mNum.textContent = m;
  vNum.textContent = V;
  rhoValue.textContent = rho.toFixed(2);

  // Würfelgröße proportional zur dritten Wurzel des Volumens
  const size = Math.cbrt(V) * 40;
  cube.style.width = size + "px";
  cube.style.height = size + "px";

  // Teilchen neu zeichnen
  cube.innerHTML = "";

  // Teilchen in gleichmäßigem Raster anordnen
  const n = Math.ceil(Math.sqrt(m));
  const spacing = size / n;

  let count = 0;

  for (let y = 0; y < n; y++) {
    for (let x = 0; x < n; x++) {
      if (count >= m) return;

      const p = document.createElement("div");
      p.className = "particle";

      // Zentriert im Raster positionieren
      p.style.left = (x * spacing + spacing / 2 - 2) + "px";
      p.style.top = (y * spacing + spacing / 2 - 2) + "px";

      cube.appendChild(p);
      count++;
    }
  }
}

// Regler reagieren auf Änderungen
mass.addEventListener("input", update);
volume.addEventListener("input", update);

// Initiale Darstellung
update();
</script>

</body>
</html>
